{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIX — Password Reset Successful</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/signupsignin.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>

    <div class="auth-wrapper">

        <!-- TOP BAR -->
        <div class="top-bar">
            <a href="{% url 'home' %}" class="logo-link">
                <div class="logo">CIVIX</div>
            </a>
            <a href="{% url 'login' %}" class="back-home">← Back to Login</a>
        </div>

        <!-- AUTH CARD -->
        <div class="auth-card">

            <div class="success-view show">
                <div class="success-icon">✅</div>
                <h2 class="form-title">Success!</h2>
                <p class="success-text">Your password has been successfully reset. You can now use your new password to sign in to your account.</p>
                
                <a href="{% url 'login' %}" class="btn btn-primary">
                    Sign In Now
                </a>
            </div>

        </div>

    </div>

</body>

</html>
