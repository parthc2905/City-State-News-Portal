{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIX — Reset Password</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/signupsignin.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>

    <div class="auth-wrapper">

        <!-- TOP BAR -->
        <div class="top-bar">
            <a href="{% url 'home' %}" class="logo-link">
                <div class="logo">CIVIX</div>
            </a>
            <a href="{% url 'login' %}" class="back-home">← Back to Login</a>
        </div>

        <!-- AUTH CARD -->
        <div class="auth-card">

            <!-- FORM HEADER -->
            <div class="form-header">
                <h1 class="form-title">Reset Your Password</h1>
                <p class="form-subtitle">Enter the email address and your new desired password.</p>
            </div>

            <div class="forms-container">
                <div class="form-view active">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="form-label" for="id_email">Email Address</label>
                            <input type="email" name="email" id="id_email" class="form-input" placeholder="name@example.com" value="{{ email|default:'' }}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="id_password">New Password</label>
                            <input type="password" name="password" id="id_password" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="id_confirm_password">Confirm New Password</label>
                            <input type="password" name="confirm_password" id="id_confirm_password" class="form-input" required>
                        </div>

                        {% if error %}
                            <div class="error-text show" style="margin-bottom:15px;">
                                {{ error }}
                            </div>
                        {% endif %}

                        <button type="submit" class="btn btn-primary">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>


            <div class="form-footer">
                Remember your password? <a href="{% url 'login' %}">Sign In</a>
            </div>

        </div>

    </div>

</body>

</html>
