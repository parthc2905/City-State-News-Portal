{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — CIVIX</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/adminPanelDashboard.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

    <!-- HEADER -->
    {% include 'components/adminPanelNavbar.html' %}

    <div class="admin-layout">

        <!-- SIDEBAR -->
        {% include 'components/adminPanelSidebar.html' %}

        <!-- MAIN CONTENT -->
        <main class="main-content">

            {% block content %}

            {% endblock content %}
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Application Details</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be dynamically inserted -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-approve-full" onclick="approveFromModal()">✓ Approve Application</button>
                <button class="btn btn-reject-full" onclick="rejectFromModal()">✕ Reject Application</button>
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
    <script src="{% static 'js/adminPanelDashboard.js' %}"></script>

</body>

</html>
