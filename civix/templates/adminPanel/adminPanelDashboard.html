{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — CIVIX</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/adminPanelDashboard.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
</head>

<body>

    <div class="dashboard-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

        <!-- SIDEBAR -->
        {% include 'components/adminPanelSidebar.html' %}

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                    {% block topbar_title %}{% endblock topbar_title %}
                </div>
                <!-- User Avatar Block from topnav -->
                <div class="nav-user" style="display: flex; align-items: center; gap: 16px;">
                    <div class="user-avatar" style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--red), var(--orange)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px;">A</div>
                    <div>
                        <div style="font-size: 14px; font-weight: 600;">Admin User</div>
                    </div>
                </div>
            </div>

            <div class="admin-content-inner" style="padding: 32px 40px; max-width: 1600px; margin: 0 auto;">
                {% block content %}

                {% endblock content %}
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Application Details</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be dynamically inserted -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-approve-full" onclick="approveFromModal()">✓ Approve Application</button>
                <button class="btn btn-reject-full" onclick="rejectFromModal()">✕ Reject Application</button>
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
    <script src="{% static 'js/adminPanelDashboard.js' %}"></script>

</body>

</html>
