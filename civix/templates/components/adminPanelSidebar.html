<aside class="sidebar">
    <div class="sidebar-section">
        <div class="sidebar-title">Main</div>
        <div class="sidebar-menu">
            <a href="{% url 'admin_panel_dashboard' %}" style="text-decoration: none;">
                <div class="menu-item {% if request.resolver_match.url_name == 'admin_panel_dashboard' %}active{% endif %}">
                    <span>📊</span>
                    Dashboard
                </div>
            </a>
            <a href="{% url 'admin_panel_applications' %}" style="text-decoration: none;">
                <div class="menu-item {% if request.resolver_match.url_name == 'admin_panel_applications' %}active{% endif %}">
                    <span>👥</span>
                    Applications
                    {% if pending_applications > 0 %}<span class="menu-badge">{{ pending_applications }}</span>{% endif %}
                </div>
            </a>
            <div class="menu-item">
                <span>📰</span>
                Articles
            </div>
            <div class="menu-item">
                <span>💬</span>
                Comments
            </div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">Users</div>
        <div class="sidebar-menu">
            <a href="{% url 'admin_panel_journalists' %}" style="text-decoration: none;">
                <div class="menu-item {% if request.resolver_match.url_name == 'admin_panel_journalists' %}active{% endif %}">
                    <span>📝</span>
                    Journalists
                </div>
            </a>
            <a href="{% url 'admin_panel_advertisers' %}" style="text-decoration: none;">
                <div class="menu-item {% if request.resolver_match.url_name == 'admin_panel_advertisers' %}active{% endif %}">
                    <span>📢</span>

                </div>
            </a>
            <a href="{% url 'admin_panel_readers' %}" style="text-decoration: none;">
                <div class="menu-item {% if request.resolver_match.url_name == 'admin_panel_readers' %}active{% endif %}">
                    <span>👤</span>
                    Readers
                </div>
            </a>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">Settings</div>
        <div class="sidebar-menu">
            <div class="menu-item">
                <span>⚙️</span>

            </div>
