<!-- 
  CIVIX DYNAMIC NAVBAR - LOGIN STATE AWARE
  Replace the existing .nav-actions section in civix_final.html with this code
-->

<!-- ADD THIS JAVASCRIPT AT THE END OF THE <body> TAG (before closing </body>) -->
<script>
// User session state - In production, this would come from your backend/session
const userSession = {
  isLoggedIn: true, // Change to false to see logged-out state
  user: {
    name: "Rajesh Kumar",
    email: "rajesh.kumar@example.com",
    avatar: "RK",
    role: "journalist" // Options: "reader", "journalist", "advertiser", "admin"
  }
};

// Function to render navbar based on login state
function renderNavbar() {
  const navActions = document.querySelector('.nav-actions');
  
  if (userSession.isLoggedIn) {
    // LOGGED IN STATE
    navActions.innerHTML = `
      <div class="nav-user-menu">
        <div class="nav-notifications" onclick="toggleNotifications()">
          <span class="notification-icon">🔔</span>
          <span class="notification-badge">3</span>
        </div>
        
        <div class="nav-user-dropdown" onclick="toggleUserMenu()">
          <div class="nav-user-avatar">${userSession.user.avatar}</div>
          <div class="nav-user-info">
            <div class="nav-user-name">${userSession.user.name}</div>
            <div class="nav-user-role">${getRoleLabel(userSession.user.role)}</div>
          </div>
          <span class="dropdown-arrow">▼</span>
        </div>

        <!-- Dropdown Menu -->
        <div class="user-dropdown-menu" id="userDropdownMenu" style="display: none;">
          <div class="dropdown-header">
            <div class="dropdown-user-avatar">${userSession.user.avatar}</div>
            <div>
              <div class="dropdown-user-name">${userSession.user.name}</div>
              <div class="dropdown-user-email">${userSession.user.email}</div>
            </div>
          </div>
          
          <div class="dropdown-divider"></div>
          
          <a href="civix_profile.html" class="dropdown-item">
            <span class="dropdown-icon">👤</span>
            Your Profile
          </a>
          
          ${userSession.user.role === 'journalist' ? `
            <a href="#" class="dropdown-item">
              <span class="dropdown-icon">📝</span>
              My Articles
            </a>
            <a href="#" class="dropdown-item">
              <span class="dropdown-icon">✍️</span>
              Write Article
            </a>
          ` : ''}
          
          ${userSession.user.role === 'advertiser' ? `
            <a href="#" class="dropdown-item">
              <span class="dropdown-icon">📊</span>
              Ad Dashboard
            </a>
            <a href="#" class="dropdown-item">
              <span class="dropdown-icon">➕</span>
              Create Campaign
            </a>
          ` : ''}
          
          ${userSession.user.role === 'admin' ? `
            <a href="civix_admin_panel.html" class="dropdown-item">
              <span class="dropdown-icon">⚙️</span>
              Admin Panel
            </a>
            <a href="#" class="dropdown-item">
              <span class="dropdown-icon">📊</span>
              Analytics
            </a>
          ` : ''}
          
          <a href="#" class="dropdown-item">
            <span class="dropdown-icon">🔖</span>
            Saved Articles
          </a>
          <a href="#" class="dropdown-item">
            <span class="dropdown-icon">⚙️</span>
            Settings
          </a>
          
          <div class="dropdown-divider"></div>
          
          <a href="#" class="dropdown-item" onclick="logout()">
            <span class="dropdown-icon">🚪</span>
            Sign Out
          </a>
        </div>

        <!-- Notifications Dropdown -->
        <div class="notifications-dropdown" id="notificationsDropdown" style="display: none;">
          <div class="notifications-header">
            <h4>Notifications</h4>
            <button class="mark-all-read">Mark all as read</button>
          </div>
          
          <div class="notifications-list">
            <div class="notification-item unread">
              <div class="notification-icon">💬</div>
              <div class="notification-content">
                <div class="notification-text"><strong>Priya Sharma</strong> commented on your article</div>
                <div class="notification-time">2 minutes ago</div>
              </div>
            </div>
            
            <div class="notification-item unread">
              <div class="notification-icon">❤️</div>
              <div class="notification-content">
                <div class="notification-text">Your article received <strong>100 likes</strong></div>
                <div class="notification-time">1 hour ago</div>
              </div>
            </div>
            
            <div class="notification-item">
              <div class="notification-icon">✅</div>
              <div class="notification-content">
                <div class="notification-text">Your article <strong>"Mumbai Traffic Solutions"</strong> was published</div>
                <div class="notification-time">3 hours ago</div>
              </div>
            </div>
          </div>
          
          <div class="notifications-footer">
            <a href="#">View all notifications</a>
          </div>
        </div>
      </div>
    `;
  } else {
    // LOGGED OUT STATE (Original buttons)
    navActions.innerHTML = `
      <button class="btn-secondary" onclick="window.location.href='civix_auth_complete.html'">Sign in</button>
      <button class="btn-primary" onclick="window.location.href='civix_auth_complete.html'">Subscribe</button>
    `;
  }
}

// Helper function to get role label
function getRoleLabel(role) {
  const labels = {
    reader: 'Reader',
    journalist: 'Journalist',
    advertiser: 'Advertiser',
    admin: 'Admin'
  };
  return labels[role] || 'User';
}

// Toggle user dropdown menu
function toggleUserMenu() {
  const menu = document.getElementById('userDropdownMenu');
  const notifications = document.getElementById('notificationsDropdown');
  
  // Close notifications if open
  if (notifications) notifications.style.display = 'none';
  
  // Toggle user menu
  if (menu) {
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
}

// Toggle notifications dropdown
function toggleNotifications() {
  const notifications = document.getElementById('notificationsDropdown');
  const menu = document.getElementById('userDropdownMenu');
  
  // Close user menu if open
  if (menu) menu.style.display = 'none';
  
  // Toggle notifications
  if (notifications) {
    notifications.style.display = notifications.style.display === 'none' ? 'block' : 'none';
  }
}

// Logout function
function logout() {
  if (confirm('Are you sure you want to sign out?')) {
    userSession.isLoggedIn = false;
    renderNavbar();
    alert('You have been signed out successfully');
    // In production, redirect to login page or clear session
  }
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(event) {
  if (!event.target.closest('.nav-user-dropdown') && !event.target.closest('.user-dropdown-menu')) {
    const menu = document.getElementById('userDropdownMenu');
    if (menu) menu.style.display = 'none';
  }
  
  if (!event.target.closest('.nav-notifications') && !event.target.closest('.notifications-dropdown')) {
    const notifications = document.getElementById('notificationsDropdown');
    if (notifications) notifications.style.display = 'none';
  }
});

// Initialize navbar on page load
document.addEventListener('DOMContentLoaded', renderNavbar);
</script>
